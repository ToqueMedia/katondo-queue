<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Logo mark -->
  <g transform="translate(20, 15)">
    <!-- Cross shape representing health/medical -->
    <rect x="12" y="0" width="16" height="40" rx="3" fill="#059669"/>
    <rect x="0" y="12" width="40" height="16" rx="3" fill="#059669"/>
    <!-- Inner highlight -->
    <rect x="16" y="4" width="8" height="32" rx="2" fill="#10B981"/>
    <rect x="4" y="16" width="32" height="8" rx="2" fill="#10B981"/>
    <!-- Pulse line -->
    <polyline points="44,20 50,20 54,8 58,32 62,14 66,20 72,20" 
              fill="none" stroke="#1565C0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Brand name -->
  <text x="110" y="42" font-family="'DM Serif Display', Georgia, serif" font-size="32" font-weight="400" fill="#0A192F">
    Clínica Katondo
  </text>
  
  <!-- Tagline -->
  <text x="110" y="62" font-family="'Geist', system-ui, sans-serif" font-size="11" font-weight="400" fill="#6B7280" letter-spacing="0.08em">
    CUIDAR DE SI É A NOSSA ESPECIALIDADE
  </text>
</svg>
