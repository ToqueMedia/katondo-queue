services:

  # ─── Database ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: katondo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-katondo_queue}
      MYSQL_TZ: Africa/Luanda
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    ports:
      # Local only — only nginx and app containers access this
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - katondo-net
    security_opt:
      - no-new-privileges:true
    # Prevent container from loading external network access
    dns: ["8.8.8.8", "8.8.4.4"]

  # ─── Application (Node.js backend + React SPA) ───────────────
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: katondo-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      DB_NAME: ${MYSQL_DATABASE:-katondo_queue}
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      TZ: Africa/Luanda
    volumes:
      - app_uploads:/app/uploads
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - katondo-net
    security_opt:
      - no-new-privileges:true

  # ─── Reverse Proxy (Nginx) ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: katondo-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      # Exposed on all interfaces — local LAN access
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - katondo-net
    security_opt:
      - no-new-privileges:true

volumes:
  mysql_data:
    driver: local
  app_uploads:
    driver: local

networks:
  katondo-net:
    driver: bridge